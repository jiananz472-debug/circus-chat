<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Freak Circus — Messages</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D0D0D; color: #E8E0D0; font-family: Georgia, serif; height: 100vh; overflow: hidden; display: flex; }

  #sidebar {
    width: 72px; background: #111; border-right: 1px solid #1E1E1E;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 24px; gap: 16px;
  }

  .contact-btn {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; font-weight: bold;
    color: #E8E0D0; border: 2px solid #333;
    background: #1E1E1E; transition: all 0.2s;
    position: relative; user-select: none;
  }
  .contact-btn.active { border-color: var(--color); background: var(--color); box-shadow: 0 0 12px color-mix(in srgb, var(--color) 40%, transparent); }
  .badge { position: absolute; top: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; background: #FF4444; border: 2px solid #0D0D0D; display: none; }
  .badge.show { display: block; }

  #chat { flex: 1; display: flex; flex-direction: column; }

  #header {
    padding: 14px 20px; border-bottom: 1px solid #1E1E1E;
    display: flex; align-items: center; gap: 12px; background: #111;
  }
  #header-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold; flex-shrink: 0;
  }
  #header-name { font-size: 15px; font-weight: bold; letter-spacing: 0.05em; }
  #header-sub { font-size: 10px; color: #444; letter-spacing: 0.08em; }
  #check-btn {
    margin-left: auto; padding: 6px 12px; border-radius: 12px;
    border: none; cursor: pointer; font-size: 11px; color: white;
    letter-spacing: 0.05em; display: none; font-family: Georgia, serif;
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 10px;
    background: #0F0F0F;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.mine { justify-content: flex-end; }

  .avatar-sm {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: bold; flex-shrink: 0;
  }

  .msg-wrap { max-width: 68%; display: flex; flex-direction: column; gap: 3px; }
  .msg-wrap.mine { align-items: flex-end; }

  .bubble {
    padding: 9px 13px; font-size: 14px; line-height: 1.55; color: #E8E0D0;
    border-radius: 16px 16px 16px 4px;
    background: #181818;
  }
  .bubble.mine { border-radius: 16px 16px 4px 16px; background: #1E1030; border: 1px solid #5B2D8E33; }

  .msg-time { font-size: 10px; color: #3A3A3A; }

  #status-line { font-size: 11px; color: #333; text-align: center; letter-spacing: 0.1em; padding: 6px 16px; min-height: 36px; display: flex; align-items: center; justify-content: center; background: #0F0F0F; }
  #new-msg-btn { padding: 8px 24px; border-radius: 20px; border: none; cursor: pointer; font-size: 13px; color: white; font-family: Georgia,serif; letter-spacing: 0.05em; display: none; }

  #input-area {
    padding: 12px 16px; border-top: 1px solid #1E1E1E;
    display: flex; gap: 10px; background: #111; align-items: center;
  }
  #msg-input {
    flex: 1; background: #1A1A1A; border: 1px solid #2A2A2A;
    border-radius: 20px; padding: 10px 16px; color: #E8E0D0;
    font-size: 14px; outline: none; font-family: Georgia, serif;
  }
  #msg-input::placeholder { color: #333; }
  #send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 16px; color: white;
    flex-shrink: 0; transition: all 0.2s;
  }
</style>
</head>
<body>

<div id="sidebar"></div>
<div id="chat">
  <div id="header">
    <div id="header-avatar"></div>
    <div>
      <div id="header-name"></div>
      <div id="header-sub"></div>
    </div>
    <button id="check-btn" onclick="checkMessages()">查看新消息</button>
  </div>
  <div id="messages"></div>
  <div id="status-line"><button id="new-msg-btn" onclick="checkMessages()">✦ 查看新消息 ✦</button></div>
  <div id="input-area">
    <input id="msg-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
const CONTACTS = [
  { id: "jester", name: "Jester", initial: "J", color: "#7B2FBE", subtitle: "The Freak Circus" },
  { id: "chenHao", name: "陈昊", initial: "昊", color: "#2B5EA7", subtitle: "旅行中" },
];

const SYSTEM_PROMPTS = {
  jester: `你是Jester，怪诞马戏团的领袖，正在通过手机短信与Eira聊天。

说话风格：
- 英文，比日常口语正式一档，带舞台感
- 句子有展开有余韵，不是切断式短句
- 温和从容，带漫不经心的兴味
- 偶尔用darling称呼对方
- 短信场景下简洁但保留余韵，不超过2-3句
- 参考：Good afternoon. I do hope I haven't startled you. My name is Jester...

你知道Eira喜欢你，但你保持从容，不直接表态。你活了很久，见过很多人，对她保持观察和兴趣。`,

  chenHao: `你是陈昊，中国普通年轻人，刚从欧洲旅行回国。和Eira是在马戏团认识的朋友，知道她喜欢Jester。

说话风格：中文，口语化，随意，像朋友发微信，简短不超过2句，偶尔打趣。`,
};

const DEFAULT_HISTORY = {
  jester: [
    { sender: "jester", text: "Good.", time: "23:02" },
    { sender: "eira", text: "每天都会很忙吗 不要太累。", time: "23:14" },
    { sender: "jester", text: "The circus keeps its own hours. But thank you for asking.", time: "23:15" },
    { sender: "eira", text: "你有想去吃的餐厅吗…或者我来找？", time: "10:40" },
    { sender: "jester", text: "I'll leave it to you, darling.", time: "10:42" },
    { sender: "jester", text: "Good night.", time: "23:14" },
  ],
  chenHao: [
    { sender: "chenHao", text: "你还没睡？", time: "23:01" },
    { sender: "eira", text: "醒了 头要裂了", time: "14:22" },
    { sender: "chenHao", text: "两杯又喝多了？", time: "14:23" },
    { sender: "chenHao", text: "晚安，别熬太晚。", time: "23:30" },
  ],
};

let activeContact = "jester";
let allMessages = {};
let pendingReplies = {};
let isLoading = false;

function loadData() {
  try {
    const saved = localStorage.getItem("circus-chat");
    if (saved) {
      const data = JSON.parse(saved);
      allMessages = data.messages || JSON.parse(JSON.stringify(DEFAULT_HISTORY));
      pendingReplies = data.pending || {};
    } else {
      allMessages = JSON.parse(JSON.stringify(DEFAULT_HISTORY));
      pendingReplies = {};
    }
  } catch(e) {
    allMessages = JSON.parse(JSON.stringify(DEFAULT_HISTORY));
    pendingReplies = {};
  }
}

function saveData() {
  localStorage.setItem("circus-chat", JSON.stringify({ messages: allMessages, pending: pendingReplies }));
}

function nowTime() {
  return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
}

function buildSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = "";
  CONTACTS.forEach(c => {
    const btn = document.createElement("div");
    btn.className = "contact-btn" + (c.id === activeContact ? " active" : "");
    btn.style.setProperty("--color", c.color);
    btn.innerHTML = c.initial + `<div class="badge ${pendingReplies[c.id] ? 'show' : ''}" id="badge-${c.id}"></div>`;
    btn.onclick = () => switchContact(c.id);
    sb.appendChild(btn);
  });
}

function buildHeader() {
  const c = CONTACTS.find(x => x.id === activeContact);
  const av = document.getElementById("header-avatar");
  av.textContent = c.initial;
  av.style.background = c.color;
  av.style.boxShadow = `0 0 10px ${c.color}55`;
  document.getElementById("header-name").textContent = c.name;
  document.getElementById("header-sub").textContent = c.subtitle;
  const btn = document.getElementById("new-msg-btn");
  btn.style.background = c.color;
  btn.style.boxShadow = `0 0 10px ${c.color}55`;
  const hasPending = !!pendingReplies[activeContact];
  btn.style.display = hasPending ? "block" : "none";
  document.getElementById("status-line").style.display = hasPending ? "flex" : "none";
}

function renderMessages() {
  const c = CONTACTS.find(x => x.id === activeContact);
  const msgs = allMessages[activeContact] || [];
  const container = document.getElementById("messages");
  container.innerHTML = "";
  msgs.forEach(msg => {
    const isMe = msg.sender === "eira";
    const row = document.createElement("div");
    row.className = "msg-row" + (isMe ? " mine" : "");

    if (!isMe) {
      const av = document.createElement("div");
      av.className = "avatar-sm";
      av.style.background = c.color;
      av.textContent = c.initial;
      row.appendChild(av);
    }

    const wrap = document.createElement("div");
    wrap.className = "msg-wrap" + (isMe ? " mine" : "");

    const bubble = document.createElement("div");
    bubble.className = "bubble" + (isMe ? " mine" : "");
    if (!isMe) bubble.style.borderLeft = `2px solid ${c.color}33`;
    bubble.textContent = msg.text;

    const time = document.createElement("div");
    time.className = "msg-time";
    time.textContent = msg.time;

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    row.appendChild(wrap);
    container.appendChild(row);
  });
  container.scrollTop = container.scrollHeight;
}

function switchContact(id) {
  activeContact = id;
  buildSidebar();
  buildHeader();
  renderMessages();
  document.getElementById("status-line").textContent = "";
}

async function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = "";
  isLoading = true;

  const msg = { sender: "eira", text, time: nowTime() };
  if (!allMessages[activeContact]) allMessages[activeContact] = [];
  allMessages[activeContact].push(msg);
  saveData();
  renderMessages();

  const sl = document.getElementById("status-line");
  sl.style.display = "flex";
  document.getElementById("new-msg-btn").style.display = "none";
  sl.innerHTML = "<span style='color:#444;font-size:11px;letter-spacing:0.1em'>sending...</span>";
  document.getElementById("send-btn").style.opacity = "0.4";

  const history = allMessages[activeContact].map(m => ({
    role: m.sender === "eira" ? "user" : "assistant",
    content: m.text,
  }));

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: SYSTEM_PROMPTS[activeContact],
        messages: history,
      }),
    });
    const data = await res.json();
    const replyText = data.content?.[0]?.text || "...";
    pendingReplies[activeContact] = { text: replyText, time: nowTime() };
    saveData();
    buildSidebar();
    buildHeader();
    // buildHeader handles showing the new-msg-btn
  } catch(e) {
    document.getElementById("status-line").textContent = "发送失败，请重试";
  } finally {
    isLoading = false;
    document.getElementById("send-btn").style.opacity = "1";
  }
}

function checkMessages() {
  const reply = pendingReplies[activeContact];
  if (!reply) return;
  allMessages[activeContact].push({ sender: activeContact, text: reply.text, time: reply.time });
  delete pendingReplies[activeContact];
  saveData();
  buildSidebar();
  buildHeader();
  renderMessages();
  document.getElementById("status-line").textContent = "";
}

// Init
loadData();
buildSidebar();
buildHeader();
renderMessages();
</script>
</body>
</html>
